<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Floret Agent Console</title>
    <link rel="stylesheet" href="/styles.css?v=testui" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-topbar">
        <a class="brand" href="/sessions" data-link>
          <span class="brand-mark">F</span>
          <span>
            <strong>Floret Agent Console</strong>
            <small id="envStatus">Loading configuration...</small>
          </span>
        </a>
        <nav class="main-nav" aria-label="Primary">
          <a href="/sessions" data-link data-route="sessions">Sessions</a>
          <a href="/sessions/new" data-link data-route="new">New Session</a>
          <a href="/settings" data-link data-route="settings">Settings</a>
        </nav>
        <div id="globalStatus" class="global-status idle" aria-live="polite">idle</div>
      </header>

      <section id="appView" class="app-view" aria-live="polite"></section>
    </main>
    <div id="toastRegion" class="toast-region" aria-label="Notifications" aria-live="polite" aria-atomic="false"></div>

    <script type="module" src="/app.js?v=testui"></script>
  </body>
</html>
